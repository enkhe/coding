# GitHub Actions snippet — keyless signing + SBOM attestation with cosign.
name: build-sign-attest

on:
  push:
    branches: [main]

permissions:
  id-token: write       # OIDC for cosign keyless
  contents: read
  packages: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }

      - name: Restore (locked)
        run: dotnet restore --locked-mode

      - name: Build & test
        run: |
          dotnet build --no-restore -c Release
          dotnet test --no-build -c Release

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          dotnet CycloneDX src/Orders.Api/Orders.Api.csproj --output ./artifacts --json

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}

      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate ./artifacts/bom.json \
            --type cyclonedx \
            ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}

      - name: Build provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
