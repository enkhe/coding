# Scheduled shutdown of non-prod resources to control burn.
name: shutdown-nonprod

on:
  schedule:
    - cron: '0 22 * * 1-5'   # 22:00 UTC weekdays
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  shutdown:
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stop non-prod VMs
        run: |
          az vm deallocate --ids $(az vm list --query "[?tags.env=='dev' || tags.env=='staging'].id" -o tsv)

      - name: Pause non-prod ACA
        run: |
          for app in $(az containerapp list --query "[?tags.env=='dev' || tags.env=='staging'].name" -o tsv); do
            rg=$(az containerapp show --name "$app" --query resourceGroup -o tsv)
            az containerapp update -n "$app" -g "$rg" --min-replicas 0 --max-replicas 0
          done
