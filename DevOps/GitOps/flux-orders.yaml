apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: orders
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/contoso/infra
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: orders
  namespace: flux-system
spec:
  interval: 5m
  path: ./apps/orders/overlays/prod
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: orders
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: orders-api
      namespace: orders
