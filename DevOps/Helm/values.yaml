replicaCount: 3

image:
  repository: ghcr.io/contoso/orders-api
  tag: 1.4.2
  pullPolicy: IfNotPresent

resources:
  requests: { cpu: 200m, memory: 256Mi }
  limits:   { cpu: 1,    memory: 512Mi }

ingress:
  enabled: true
  className: nginx
  host: api.orders.contoso.com
  tls: true

postgresql:
  enabled: true
  auth:
    database: orders

env:
  ASPNETCORE_ENVIRONMENT: Production
  OTEL_SERVICE_NAME: orders-api
